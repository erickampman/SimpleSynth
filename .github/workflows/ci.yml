name: CI

on:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (${{ matrix.os }} / ${{ matrix.cc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest, cc: clang, cxx: clang++ }
          - { os: macos-latest,  cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install DPF UI deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgl1-mesa-dev libx11-dev \
            libxext-dev libxrandr-dev libxcursor-dev
      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DSIMPLESYNTH_WERROR=ON
      - name: Build
        run: cmake --build build -j
      - name: Test (framework self-tests via ctest)
        run: ctest --test-dir build --output-on-failure --timeout 30
